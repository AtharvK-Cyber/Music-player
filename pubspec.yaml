name: offline_music_player
description: A cross-platform offline music player with playlist downloading capabilities
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Audio playback
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.11
  audio_service: ^0.18.12
  
  # Download management
  flutter_downloader: ^1.11.5
  dio: ^5.4.0
  
  # Local file scanning & metadata
  on_audio_query: ^2.9.0
  flutter_media_metadata: ^1.0.0
  
  # Permissions
  permission_handler: ^11.2.0
  
  # Storage & file system
  path_provider: ^2.1.2
  path: ^1.8.3
  
  # Clipboard & URL parsing
  clipboard: ^0.1.3
  url_launcher: ^6.2.4
  
  # State management
  provider: ^6.1.1
  
  # Local storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  
  # UI components
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  animations: ^2.0.11
  
  # Utilities
  http: ^1.2.0
  html: ^0.15.4
  uuid: ^4.3.3
  intl: ^0.19.0
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
